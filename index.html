<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.H.A.D.O.W.</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --bg:#050a0f;
    --bg2:#0a1620;
    --cyan:#4fd8f0;
    --cyan-dim:#1c5f6e;
    --amber:#ffb020;
    --red:#ff5c5c;
    --text:#dff6fb;
    --text-dim:#6f95a0;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;height:100%;
    background:radial-gradient(ellipse at 50% 0%, #0d1e29 0%, var(--bg) 55%, #020508 100%);
    color:var(--text);
    font-family:'Share Tech Mono', monospace;
    overflow:hidden;
  }
  #app{
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    height:100%;padding:24px 16px;position:relative;
  }
  .brand{
    font-family:'Orbitron',sans-serif;font-weight:800;letter-spacing:6px;
    font-size:14px;color:var(--cyan);opacity:.85;
    text-shadow:0 0 12px rgba(79,216,240,.6);
  }
  .brand span{color:var(--text-dim);font-weight:400;letter-spacing:3px;}

  /* Reactor core */
  #core-wrap{
    position:relative;width:min(58vw,320px);height:min(58vw,320px);
    display:flex;align-items:center;justify-content:center;
    margin:12px 0;
  }
  .ring{
    position:absolute;border-radius:50%;
    border:1.5px solid var(--cyan-dim);
  }
  .ring1{inset:0;}
  .ring2{inset:14%;border-style:dashed;opacity:.6;animation:spin 18s linear infinite;}
  .ring3{inset:28%;opacity:.9;}
  #core{
    position:relative;width:44%;height:44%;border-radius:50%;
    background:radial-gradient(circle at 40% 35%, #bff3ff 0%, var(--cyan) 35%, #0e5866 70%, transparent 100%);
    box-shadow:0 0 30px 6px rgba(79,216,240,.45), inset 0 0 20px rgba(255,255,255,.3);
    transition:transform .25s ease, box-shadow .25s ease;
  }
  #core-wrap.listening #core{animation:pulse 1.4s ease-in-out infinite;}
  #core-wrap.thinking .ring2{animation-duration:2.5s;}
  #core-wrap.thinking #core{animation:think 0.9s ease-in-out infinite;}
  #core-wrap.speaking #core{animation:speak 0.35s ease-in-out infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 30px 6px rgba(79,216,240,.45);}50%{transform:scale(1.08);box-shadow:0 0 46px 12px rgba(79,216,240,.7);}}
  @keyframes think{0%,100%{transform:scale(1) rotate(0deg);}50%{transform:scale(.94) rotate(6deg);}}
  @keyframes speak{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}

  #status{
    font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:4px;
    color:var(--cyan);text-transform:uppercase;margin-top:6px;min-height:16px;
    text-shadow:0 0 8px rgba(79,216,240,.5);
  }

  /* Transcript log */
  #log{
    width:100%;max-width:520px;flex:1;overflow-y:auto;
    padding:8px 4px;font-size:13px;line-height:1.5;
    -webkit-mask-image:linear-gradient(to bottom, transparent, black 8%, black 92%, transparent);
  }
  #log .line{margin:6px 0;opacity:0;animation:fadein .3s forwards;}
  @keyframes fadein{to{opacity:1;}}
  #log .you{color:var(--amber);}
  #log .you::before{content:"DU  ";color:var(--text-dim);}
  #log .jarvis{color:var(--cyan);}
  #log .jarvis::before{content:"SHADOW  ";color:var(--text-dim);}
  #log .sys{color:var(--text-dim);font-style:italic;}

  /* Controls */
  #controls{display:flex;gap:14px;align-items:center;margin-top:8px;opacity:0;pointer-events:none;transition:opacity .35s ease;flex-wrap:wrap;justify-content:center;}
  #controls.visible{opacity:1;pointer-events:auto;}
  #hint{font-size:9px;color:var(--text-dim);letter-spacing:1px;margin-top:6px;opacity:.6;text-align:center;max-width:320px;}
  .btn{
    background:transparent;border:1px solid var(--cyan-dim);color:var(--cyan);
    font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;
    padding:10px 16px;border-radius:4px;cursor:pointer;transition:.2s;
  }
  .btn:hover{background:rgba(79,216,240,.1);border-color:var(--cyan);}
  .btn.active{background:rgba(79,216,240,.18);box-shadow:0 0 12px rgba(79,216,240,.4);}
  .icon-btn{
    width:40px;height:40px;border-radius:50%;border:1px solid var(--cyan-dim);
    background:transparent;color:var(--cyan);cursor:pointer;display:flex;
    align-items:center;justify-content:center;font-size:16px;transition:.2s;
  }
  .icon-btn:hover{background:rgba(79,216,240,.12);}

  video#camview{
    position:fixed;bottom:14px;right:14px;width:110px;height:82px;
    border:1px solid var(--cyan-dim);border-radius:4px;object-fit:cover;
    opacity:0;pointer-events:none;transition:opacity .3s;background:#000;
  }
  video#camview.show{opacity:1;}

  #footer{
    font-size:9px;color:var(--text-dim);letter-spacing:1px;margin-top:10px;
    opacity:.55;text-align:center;font-family:'Share Tech Mono',monospace;
  }

  /* Status badges */
  #badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px;max-width:520px;}
  .badge{
    display:flex;align-items:center;gap:5px;font-size:10px;letter-spacing:1px;
    padding:4px 9px;border-radius:20px;border:1px solid var(--cyan-dim);color:var(--text-dim);
    font-family:'Orbitron',sans-serif;text-transform:uppercase;transition:.2s;
  }
  .badge .dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);flex:none;}
  .badge.on{color:var(--cyan);border-color:var(--cyan);}
  .badge.on .dot{background:var(--cyan);box-shadow:0 0 6px var(--cyan);}
  .badge.off .dot{background:var(--red);}

  /* Chat bubbles */
  #log{
    width:100%;max-width:560px;flex:1;overflow-y:auto;
    padding:10px 4px;display:flex;flex-direction:column;gap:10px;
    -webkit-mask-image:linear-gradient(to bottom, transparent, black 4%, black 94%, transparent);
  }
  .bubble-row{display:flex;opacity:0;animation:fadein .3s forwards;max-width:88%;}
  .bubble-row.you{align-self:flex-end;flex-direction:row-reverse;}
  .bubble-row.jarvis{align-self:flex-start;}
  .bubble{
    padding:9px 13px;border-radius:12px;font-size:13.5px;line-height:1.5;
  }
  .bubble-row.you .bubble{background:rgba(255,176,32,.12);border:1px solid rgba(255,176,32,.35);color:var(--amber);border-bottom-right-radius:3px;}
  .bubble-row.jarvis .bubble{background:rgba(79,216,240,.08);border:1px solid var(--cyan-dim);color:var(--text);border-bottom-left-radius:3px;}
  .bubble img{max-width:100%;border-radius:8px;display:block;margin-top:6px;border:1px solid var(--cyan-dim);}
  .bubble-label{font-size:9px;letter-spacing:2px;color:var(--text-dim);margin:0 4px 3px;font-family:'Orbitron',sans-serif;}
  .bubble-row.you .bubble-label{text-align:right;}
  #log .sys{align-self:center;color:var(--text-dim);font-style:italic;font-size:11px;opacity:.85;}
  .typing-dots span{display:inline-block;width:5px;height:5px;background:var(--cyan);border-radius:50%;margin:0 2px;animation:tdot 1.1s infinite;}
  .typing-dots span:nth-child(2){animation-delay:.15s;}
  .typing-dots span:nth-child(3){animation-delay:.3s;}
  @keyframes tdot{0%,60%,100%{opacity:.25;transform:translateY(0);}30%{opacity:1;transform:translateY(-3px);}}

  /* Text input bar */
  #inputbar{display:flex;gap:8px;width:100%;max-width:560px;margin-top:10px;}
  #textInput{
    flex:1;background:#02090c;border:1px solid var(--cyan-dim);color:var(--text);
    padding:11px 14px;border-radius:22px;font-family:'Share Tech Mono',monospace;font-size:13px;
  }
  #textInput:focus{outline:none;border-color:var(--cyan);}
  #sendBtn{
    width:42px;height:42px;border-radius:50%;border:1px solid var(--cyan);background:rgba(79,216,240,.12);
    color:var(--cyan);cursor:pointer;font-size:15px;transition:.2s;flex:none;
  }
  #sendBtn:hover{background:rgba(79,216,240,.25);}
  #stopSpeakBtn{display:none;}
  #stopSpeakBtn.show{display:flex;}

  /* Toasts */
  #toasts{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:8px;align-items:center;}
  .toast{
    background:#1a0e0e;border:1px solid var(--red);color:#ffd6d6;font-size:12px;
    padding:9px 16px;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.4);
    opacity:0;animation:toastin .25s forwards;max-width:80vw;
  }
  .toast.info{border-color:var(--cyan);background:#08161a;color:var(--text);}
  @keyframes toastin{to{opacity:1;}}

  /* Setup / settings modal */
  .modal-back{
    position:fixed;inset:0;background:rgba(2,5,8,.88);backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;z-index:50;
  }
  .modal{
    width:min(90vw,380px);background:var(--bg2);border:1px solid var(--cyan-dim);
    border-radius:8px;padding:24px;box-shadow:0 0 40px rgba(79,216,240,.15);
  }
  .modal h2{font-family:'Orbitron',sans-serif;color:var(--cyan);font-size:16px;letter-spacing:2px;margin:0 0 6px;}
  .modal p{color:var(--text-dim);font-size:12px;line-height:1.5;margin:0 0 16px;}
  .modal label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:4px;letter-spacing:1px;}
  .modal input{
    width:100%;background:#02090c;border:1px solid var(--cyan-dim);color:var(--text);
    padding:10px;border-radius:4px;font-family:'Share Tech Mono',monospace;font-size:13px;margin-bottom:14px;
  }
  .modal input:focus{outline:none;border-color:var(--cyan);}
  .modal .row{display:flex;gap:8px;justify-content:flex-end;}
  .modal a{color:var(--cyan);}
  #err{color:var(--red);font-size:11px;min-height:14px;margin:-8px 0 10px;}
</style>
</head>
<body>
<div id="toasts"></div>
<div id="app">
  <div class="brand">S.H.A.D.O.W. <span>// PERSONAL ASSISTANT</span></div>

  <div id="core-wrap">
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="ring ring3"></div>
    <div id="core"></div>
  </div>
  <div id="status">initialisiere</div>
  <div id="badges"></div>

  <div id="log"></div>

  <div id="inputbar">
    <input type="text" id="textInput" placeholder="Nachricht an Shadow eingeben..." autocomplete="off">
    <button id="sendBtn" title="Senden">➤</button>
  </div>

  <div id="controls">
    <button class="icon-btn" id="micBtn" title="Manuell sprechen">🎤</button>
    <button class="btn" id="toggleListen">WAKE-WORD AN</button>
    <button class="icon-btn" id="stopSpeakBtn" title="Sprechen stoppen">⏹</button>
    <button class="icon-btn" id="folderBtn" title="Ordner freigeben (Dateizugriff)">📁</button>
    <button class="icon-btn" id="googleBtn" title="Mit Google verbinden (Kalender & E-Mail)">🔗</button>
    <button class="icon-btn" id="settingsBtn" title="Einstellungen">⚙</button>
  </div>

  <div id="hint">Sag "Shadow, zeig Steuerung" oder tippe auf den Kern, um die Buttons einzublenden.</div>

  <video id="camview" autoplay playsinline muted></video>
  <canvas id="camcanvas" style="display:none"></canvas>

  <div id="footer">© S.H.A.D.O.W. — erstellt von Rishi Sundri. Alle Rechte vorbehalten.</div>
</div>

<div class="modal-back" id="setupModal" style="display:none">
  <div class="modal">
    <h2>ERSTEINRICHTUNG</h2>
    <p>Hallo Herr Sundri. Ich bitte Sie, sich zu verifizieren.</p>
    <div id="err"></div>
    <label>GEMINI API-KEY</label>
    <input type="password" id="apiKeyInput" placeholder="AIza..." autocomplete="off">
    <label>WAKE-WORD (dein Aktivierungswort)</label>
    <input type="text" id="wakeWordInput" value="Shadow">
    <div class="row"><button class="btn active" id="saveSetup">SPEICHERN & STARTEN</button></div>
  </div>
</div>

<div class="modal-back" id="settingsModal" style="display:none">
  <div class="modal">
    <h2>EINSTELLUNGEN</h2>
    <label>GEMINI API-KEY</label>
    <input type="password" id="apiKeyInput2" placeholder="AIza...">
    <label>GEMINI MODELL (Text, Werkzeuge & Kamera)</label>
    <input type="text" id="modelInput2" placeholder="gemini-2.5-flash">
    <label>WAKE-WORD</label>
    <input type="text" id="wakeWordInput2">
    <label>STIMME</label>
    <select id="voiceSelect2"><option value="">Automatisch (männlich bevorzugt)</option></select>
    <label>TONHÖHE (0.5 tief/männlich – 1.5 hoch), Standard 0.82</label>
    <input type="number" id="pitchInput2" min="0.5" max="1.5" step="0.02" placeholder="0.82">
    <label>SPRECHGESCHWINDIGKEIT (0.7–1.3), Standard 1.04</label>
    <input type="number" id="rateInput2" min="0.7" max="1.3" step="0.02" placeholder="1.04">
    <label>GOOGLE CLIENT-ID (für Kalender & E-Mail)</label>
    <input type="text" id="googleClientIdInput" placeholder="123...apps.googleusercontent.com">
    <div class="row">
      <button class="btn" id="clearChat">CHAT LEEREN</button>
      <button class="btn" id="clearAll">ALLES ZURÜCKSETZEN</button>
      <button class="btn active" id="saveSettings">SPEICHERN</button>
    </div>
  </div>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const logEl = $('log'), statusEl = $('status'), coreWrap = $('core-wrap');
  const camview = $('camview'), camcanvas = $('camcanvas');

  let apiKey = localStorage.getItem('Shadow_apikey') || '';
  let geminiModel = localStorage.getItem('Shadow_model') || 'gemini-2.5-flash';
  let wakeWord = (localStorage.getItem('Shadow_wakeword') || 'Shadow').toLowerCase();
  let controlsVisible = false;
  let history = JSON.parse(localStorage.getItem('Shadow_history') || '[]');
  let memoryFacts = JSON.parse(localStorage.getItem('Shadow_memory') || '[]');
  let dirHandle = null;
  let googleClientId = localStorage.getItem('Shadow_google_clientid') || '';
  let googleAccessToken = null;
  let googleTokenClient = null;
  let pendingAction = null;
  let camStream = null;
  let recognition = null;
  let wakeModeOn = true;
  let awaitingCommand = false;
  let isSpeaking = false;
  let isBusy = false;
  let convoTimeout = null;

  // ---------- Mini IndexedDB helper (für den Ordner-Handle) ----------
  function idbOpen(){
    return new Promise((res, rej) => {
      const req = indexedDB.open('shadow_store', 1);
      req.onupgradeneeded = () => req.result.createObjectStore('kv');
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  }
  async function idbSet(key, val){
    const db = await idbOpen();
    return new Promise((res, rej) => {
      const tx = db.transaction('kv','readwrite');
      tx.objectStore('kv').put(val, key);
      tx.oncomplete = () => res();
      tx.onerror = () => rej(tx.error);
    });
  }
  async function idbGet(key){
    const db = await idbOpen();
    return new Promise((res, rej) => {
      const tx = db.transaction('kv','readonly');
      const req = tx.objectStore('kv').get(key);
      req.onsuccess = () => res(req.result || null);
      req.onerror = () => rej(req.error);
    });
  }

  function setStatus(text, mode){
    statusEl.textContent = text;
    coreWrap.className = mode || '';
  }

  function showToast(msg, type){
    const t = document.createElement('div');
    t.className = 'toast' + (type === 'info' ? ' info' : '');
    t.textContent = msg;
    $('toasts').appendChild(t);
    setTimeout(() => { t.style.transition='opacity .3s'; t.style.opacity='0'; setTimeout(()=>t.remove(), 300); }, 4500);
  }

  function addLine(who, text){
    if(who === 'sys'){
      const d = document.createElement('div');
      d.className = 'line sys';
      d.textContent = text;
      logEl.appendChild(d);
      logEl.scrollTop = logEl.scrollHeight;
      return;
    }
    const row = document.createElement('div');
    row.className = 'bubble-row ' + who;
    const label = document.createElement('div');
    label.className = 'bubble-label';
    label.textContent = who === 'you' ? 'DU' : 'SHADOW';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    const col = document.createElement('div');
    col.appendChild(label);
    col.appendChild(bubble);
    row.appendChild(col);
    logEl.appendChild(row);
    logEl.scrollTop = logEl.scrollHeight;

    history.push({role: who==='you'?'user':'assistant', text: text});
    if(history.length > 20) history = history.slice(-20);
    localStorage.setItem('Shadow_history', JSON.stringify(history));
  }

  function addImageBubble(url, caption){
    const row = document.createElement('div');
    row.className = 'bubble-row jarvis';
    const label = document.createElement('div');
    label.className = 'bubble-label';
    label.textContent = 'SHADOW';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if(caption){
      const cap = document.createElement('div');
      cap.textContent = caption;
      bubble.appendChild(cap);
    }
    const img = document.createElement('img');
    img.src = url;
    img.alt = caption || 'Generiertes Bild';
    bubble.appendChild(img);
    const col = document.createElement('div');
    col.appendChild(label);
    col.appendChild(bubble);
    row.appendChild(col);
    logEl.appendChild(row);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function showTyping(){
    if($('typingRow')) return;
    const row = document.createElement('div');
    row.id = 'typingRow';
    row.className = 'bubble-row jarvis';
    row.innerHTML = `<div><div class="bubble-label">SHADOW</div><div class="bubble typing-dots"><span></span><span></span><span></span></div></div>`;
    logEl.appendChild(row);
    logEl.scrollTop = logEl.scrollHeight;
  }
  function hideTyping(){
    const r = $('typingRow');
    if(r) r.remove();
  }

  function updateBadges(){
    const badgesEl = $('badges');
    const items = [
      { on: !!apiKey, label: 'GEMINI' },
      { on: wakeModeOn, label: 'WAKE-WORD' },
      { on: !!dirHandle, label: 'ORDNER' },
      { on: !!googleAccessToken, label: 'GOOGLE' }
    ];
    badgesEl.innerHTML = '';
    items.forEach(it => {
      const b = document.createElement('div');
      b.className = 'badge ' + (it.on ? 'on' : 'off');
      b.innerHTML = `<span class="dot"></span>${it.label}`;
      badgesEl.appendChild(b);
    });
  }

  // ---------- Setup flow ----------
  if(!apiKey){
    $('setupModal').style.display = 'flex';
  } else {
    boot();
  }

  $('saveSetup').onclick = () => {
    const k = $('apiKeyInput').value.trim();
    const w = $('wakeWordInput').value.trim().toLowerCase() || 'Shadow';
    if(k.length < 10){
      $('err').textContent = 'Das sieht nicht wie ein gültiger Gemini-Key aus. Hol ihn dir kostenlos unter aistudio.google.com/apikey.';
      return;
    }
    localStorage.setItem('Shadow_apikey', k);
    localStorage.setItem('Shadow_wakeword', w);
    apiKey = k; wakeWord = w;
    $('setupModal').style.display = 'none';
    boot();
  };

  $('settingsBtn').onclick = () => {
    $('apiKeyInput2').value = '';
    $('modelInput2').value = geminiModel;
    $('wakeWordInput2').value = wakeWord;
    $('googleClientIdInput').value = googleClientId;
    $('pitchInput2').value = localStorage.getItem('Shadow_voice_pitch') || '0.82';
    $('rateInput2').value = localStorage.getItem('Shadow_voice_rate') || '1.04';
    populateVoiceSelect();
    $('settingsModal').style.display = 'flex';
  };
  $('saveSettings').onclick = () => {
    const k = $('apiKeyInput2').value.trim();
    const m = $('modelInput2').value.trim();
    const w = $('wakeWordInput2').value.trim().toLowerCase();
    const g = $('googleClientIdInput').value.trim();
    const voiceName = $('voiceSelect2').value;
    const pitch = $('pitchInput2').value.trim();
    const rate = $('rateInput2').value.trim();
    if(k) { localStorage.setItem('Shadow_apikey', k); apiKey = k; }
    if(m) { localStorage.setItem('Shadow_model', m); geminiModel = m; }
    if(w) { localStorage.setItem('Shadow_wakeword', w); wakeWord = w; }
    if(g) { localStorage.setItem('Shadow_google_clientid', g); googleClientId = g; initGoogleTokenClient(); }
    localStorage.setItem('Shadow_voice_name', voiceName || '');
    if(pitch) localStorage.setItem('Shadow_voice_pitch', pitch);
    if(rate) localStorage.setItem('Shadow_voice_rate', rate);
    $('settingsModal').style.display = 'none';
    updateBadges();
    showToast('Einstellungen gespeichert.', 'info');
    speak('So klingt meine Stimme jetzt, Sir.');
  };
  $('clearAll').onclick = () => {
    localStorage.clear();
    location.reload();
  };
  $('clearChat').onclick = () => {
    history = [];
    localStorage.setItem('Shadow_history', '[]');
    logEl.innerHTML = '';
    $('settingsModal').style.display = 'none';
    showToast('Chatverlauf gelöscht.', 'info');
  };

  // ---------- Steuerung ein-/ausblenden ----------
  function showControls(){
    controlsVisible = true;
    $('controls').classList.add('visible');
  }
  function hideControls(){
    controlsVisible = false;
    $('controls').classList.remove('visible');
  }
  function toggleControls(){
    controlsVisible ? hideControls() : showControls();
  }
  coreWrap.addEventListener('click', toggleControls);

  // ---------- Boot ----------
  async function boot(){
    setStatus('bereit', '');
    addLine('sys', `Sag "${wakeWord}" gefolgt von deiner Frage, tippe unten, oder klick auf den Kern für die Steuerung.`);
    initRecognition();
    updateBadges();
    try{
      const saved = await idbGet('dir_handle');
      if(saved){
        const perm = await saved.queryPermission({mode:'read'});
        if(perm === 'granted'){
          dirHandle = saved;
          addLine('sys', `Zugriff auf Ordner "${saved.name}" wiederhergestellt.`);

  // ---------- Speech recognition (Wake word + commands) ----------
  function initRecognition(){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){
      addLine('sys', 'Dein Browser unterstützt keine Spracherkennung. Bitte Google Chrome nutzen.');
      return;
    }
    recognition = new SR();
    recognition.lang = 'de-DE';
    recognition.continuous = true;
    recognition.interimResults = false;

    recognition.onresult = (e) => {
      const res = e.results[e.results.length-1];
      if(!res.isFinal) return;
      const transcript = res[0].transcript.trim();
      handleTranscript(transcript);
    };

    recognition.onerror = (e) => {
      if(e.error === 'not-allowed' || e.error === 'service-not-allowed'){
        addLine('sys', 'Mikrofon-Zugriff wurde blockiert. Bitte klick auf das Schloss-Symbol links neben der Adresse und stell "Mikrofon" auf "Zulassen".');
        wakeModeOn = false;
        $('toggleListen').textContent = 'WAKE-WORD AUS';
      }
      // andere Fehler wie 'no-speech' oder 'aborted' sind normal und werden über onend sanft neu gestartet
    };
    recognition.onend = () => {
      if(wakeModeOn && !isSpeaking && !isBusy){
        setTimeout(() => { try{ recognition.start(); }catch(e){} }, 250);
      } else if(!wakeModeOn){
        setStatus('bereit','');
      }
    };
    try{ recognition.start(); setStatus('lausche', 'listening'); }catch(e){}
  }

  $('toggleListen').onclick = () => {
    wakeModeOn = !wakeModeOn;
    $('toggleListen').textContent = wakeModeOn ? 'WAKE-WORD AN' : 'WAKE-WORD AUS';
    $('toggleListen').classList.toggle('active', wakeModeOn);
    updateBadges();
    if(wakeModeOn){
      try{ recognition.start(); setStatus('lausche','listening'); }catch(e){}
    } else {
      try{ recognition.stop(); }catch(e){}
      setStatus('bereit','');
    }
  };

  function handleTranscript(transcript){
    const lower = transcript.toLowerCase();
    if(awaitingCommand){
      awaitingCommand = false;
      processCommand(transcript);
      return;
    }
    const idx = lower.indexOf(wakeWord);
    if(idx === -1) return; // ignore anything without wake word
    const after = transcript.slice(idx + wakeWord.length).trim();
    if(after.length < 2){
      speak('Ja?');
      awaitingCommand = true;
    } else {
      processCommand(after);
    }
  }

    googleTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: googleClientId,
      scope: 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.send',

  async function ensureGoogleToken(){
    if(googleAccessToken) return googleAccessToken;
    if(!googleClientId) throw new Error('Keine Google Client-ID hinterlegt. Bitte in den Einstellungen eintragen und auf 🔗 klicken.');
    return new Promise((resolve, reject) => {
      if(!googleTokenClient) initGoogleTokenClient();
      if(!googleTokenClient) return reject(new Error('Google-Anmeldung konnte nicht initialisiert werden.'));
      googleTokenClient.callback = (resp) => {
        if(resp && resp.access_token){ googleAccessToken = resp.access_token; resolve(resp.access_token); }
        else reject(new Error('Google-Anmeldung fehlgeschlagen.'));
      };
      googleTokenClient.requestAccessToken({ prompt: 'consent' });
    });
  }

  async function toolGetCalendarEvents(args){
    try{
      const token = await ensureGoogleToken();
      const timeMin = encodeURIComponent(new Date().toISOString());
      const timeMax = encodeURIComponent(new Date(Date.now() + (args && args.days ? args.days : 7) * 86400000).toISOString());
      const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime&maxResults=15`;
      const resp = await fetch(url, { headers:{ Authorization: 'Bearer ' + token } });
      if(!resp.ok){ const t = await resp.text(); return {error:'Kalender-Fehler ' + resp.status + ': ' + t.slice(0,300)}; }
      const data = await resp.json();
      const events = (data.items||[]).map(e => ({
        titel: e.summary || '(ohne Titel)',
        start: e.start ? (e.start.dateTime || e.start.date) : null,
        ort: e.location || null
      }));
      return { termine: events };
    }catch(e){ return {error: e.message}; }
  }

  async function toolGetRecentEmails(args){
    try{
      const token = await ensureGoogleToken();
      const max = parseInt((args && args.max_results) || 5, 10) || 5;
      const listResp = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=${max}&labelIds=INBOX`, { headers:{ Authorization: 'Bearer ' + token } });
      if(!listResp.ok){ const t = await listResp.text(); return {error:'Gmail-Fehler ' + listResp.status + ': ' + t.slice(0,300)}; }
      const listData = await listResp.json();
      const mails = [];
      for(const m of (listData.messages||[])){
        const msgResp = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From`, { headers:{ Authorization: 'Bearer ' + token } });
        if(!msgResp.ok) continue;
        const msgData = await msgResp.json();
        const headers = (msgData.payload && msgData.payload.headers) || [];
        mails.push({
          von: (headers.find(h=>h.name==='From')||{}).value || '?',
          betreff: (headers.find(h=>h.name==='Subject')||{}).value || '(kein Betreff)',
          ausschnitt: msgData.snippet || ''
        });
      }
      return { emails: mails };
    }catch(e){ return {error: e.message}; }
  }

  async function actuallyCreateCalendarEvent(args){
    const token = await ensureGoogleToken();
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const body = {
      summary: args.summary,
      location: args.location || undefined,
      start: { dateTime: args.start, timeZone: tz },
      end: { dateTime: args.end, timeZone: tz }
    };
    const resp = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
      method:'POST',
      headers:{ Authorization:'Bearer ' + token, 'Content-Type':'application/json' },
      body: JSON.stringify(body)
    });
    if(!resp.ok){ const t = await resp.text(); throw new Error('Kalender-Fehler ' + resp.status + ': ' + t.slice(0,150)); }
    return await resp.json();
  }

  async function actuallySendEmail(args){
    const token = await ensureGoogleToken();
    const raw = [
      `To: ${args.to}`,
      `Subject: ${args.subject}`,
      'Content-Type: text/plain; charset=utf-8',
      '',
      args.body
    ].join('\n');
    const encoded = btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const resp = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
      method:'POST',
      headers:{ Authorization:'Bearer ' + token, 'Content-Type':'application/json' },
      body: JSON.stringify({ raw: encoded })
    });
    if(!resp.ok){ const t = await resp.text(); throw new Error('Gmail-Fehler ' + resp.status + ': ' + t.slice(0,150)); }
    return await resp.json();
  }

  function convertSchemaToLower(schema){
    if(!schema || typeof schema !== 'object') return schema;
    const out = Array.isArray(schema) ? [] : {};
    for(const key in schema){
      if(key === 'type' && typeof schema[key] === 'string'){
        out[key] = schema[key].toLowerCase();
      } else if(key === 'properties' && typeof schema[key] === 'object'){
        out[key] = {};
        for(const p in schema[key]) out[key][p] = convertSchemaToLower(schema[key][p]);
      } else {
        out[key] = schema[key];
      }
    }
    if(!out.properties) out.properties = {};
    return out;
  }

  // ---------- Process a command ----------
  async function processCommand(text){
    if(!text) return;
    isBusy = true;
    addLine('you', text);

    // Bestätigung/Abbruch einer vorbereiteten Aktion abfangen, bevor das Modell gefragt wird
    if(pendingAction){
      const lower = text.toLowerCase();
      if(confirmWords.some(w => lower.includes(w))){
        setStatus('führe aus', 'thinking');
        showTyping();
        try{ recognition.stop(); }catch(e){}
        try{
          if(pendingAction.type === 'calendar_create'){
            await actuallyCreateCalendarEvent(pendingAction.args);
            hideTyping();
            addLine('jarvis', `Sehr wohl, Sir. Der Termin "${pendingAction.args.summary}" wurde angelegt.`);
            speak(`Sehr wohl, Sir. Der Termin wurde angelegt.`);
          } else if(pendingAction.type === 'email_send'){
            await actuallySendEmail(pendingAction.args);
            hideTyping();
            addLine('jarvis', `Die E-Mail an ${pendingAction.args.to} wurde versendet, Sir.`);
            speak(`Die E-Mail wurde versendet, Sir.`);
          }
        }catch(e){
          hideTyping();
          addLine('sys', 'Fehler bei der Ausführung: ' + e.message);
          showToast(e.message);
          speak('Es gab leider ein Problem bei der Ausführung, Sir.');
        }
        pendingAction = null;
        return;
      }
      if(cancelWords.some(w => lower.includes(w))){
        pendingAction = null;
        addLine('jarvis', 'Verstanden, Sir. Ich habe die Aktion verworfen.');
        speak('Verstanden, Sir. Abgebrochen.');
        return;
      }
      // weder bestätigt noch abgebrochen -> normal weiterverarbeiten, Modell entscheidet
    }

    // ---------- Sofortige lokale Interface-Befehle (kein API-Aufruf nötig) ----------
    const lowerCmd = text.toLowerCase();
    function finishLocal(replyText){
      addLine('jarvis', replyText);
      speak(replyText);
    }
    if(/(zeig|zeige|blende ein|öffne)\s+.*(steuerung|knöpfe|buttons|kontrollen)/.test(lowerCmd)){
      showControls();
      finishLocal('Steuerung eingeblendet, Sir.');
      return;
    }
    if(/(versteck|verstecke|blende aus|ausblenden)\s+.*(steuerung|knöpfe|buttons|kontrollen)/.test(lowerCmd)){
      hideControls();
      finishLocal('Steuerung ausgeblendet, Sir.');
      return;
    }
    if(/öffne?\s+.*einstellungen/.test(lowerCmd)){
      $('settingsBtn').click();
      finishLocal('Einstellungen geöffnet, Sir.');
      return;
    }
    if(/schließe?\s+.*einstellungen/.test(lowerCmd)){
      $('settingsModal').style.display = 'none';
      finishLocal('Einstellungen geschlossen, Sir.');
      return;
    }

    setStatus('denke nach', 'thinking');
    showTyping();
    try{ recognition.stop(); }catch(e){}

    try{
      const needsVision = visionTriggers.some(t => text.toLowerCase().includes(t));
      let userParts;
      if(needsVision){
        const img = await captureImageBase64();
        userParts = [
          { text: text },
          { inlineData: { mimeType: 'image/jpeg', data: img } }
        ];
      } else {
        userParts = [{ text: text }];
      }

      let contents = [
        ...history.slice(0,-1).map(h => ({ role: h.role === 'user' ? 'user' : 'model', parts: [{ text: h.text }] })),
        { role: 'user', parts: userParts }
      ];

      const geminiTools = [{ functionDeclarations: toolDeclarations }];
      let reply = '...';

      for(let step=0; step<4; step++){
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(geminiModel)}:generateContent?key=${encodeURIComponent(apiKey)}`, {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: buildSystemInstruction() }] },
            contents: contents,
            tools: geminiTools
          })
        });

        if(!resp.ok){
          const errBody = await resp.text();
          throw new Error('API-Fehler ' + resp.status + ': ' + errBody.slice(0,200));
        }
        const data = await resp.json();
        const candidate = data.candidates && data.candidates[0];
        const parts = (candidate && candidate.content && candidate.content.parts) || [];
        const functionCalls = parts.filter(p => p.functionCall).map(p => p.functionCall);

        if(functionCalls.length){
          contents.push({ role:'model', parts: parts });
          setStatus('nutze werkzeug', 'thinking');
          const responseParts = [];
          for(const fc of functionCalls){
            const result = await executeTool(fc.name, fc.args || {});
            responseParts.push({ functionResponse: { name: fc.name, response: result } });
          }
          contents.push({ role:'function', parts: responseParts });
          continue; // ask the model again with the tool result
        }

        reply = parts.map(p => p.text || '').join('').trim() || '...';
        break;
      }

      hideTyping();
      addLine('jarvis', reply);
      speak(reply);
    } catch(err){
      hideTyping();
      addLine('sys', 'Fehler: ' + err.message);
      showToast(err.message);
      setStatus('bereit', '');
      isBusy = false;
      if(wakeModeOn){ try{ recognition.start(); }catch(e){} }
    }
  }

  // ---------- Speech synthesis ----------
  let voices = [];
  function loadVoices(){
    voices = speechSynthesis.getVoices();
    populateVoiceSelect();
  }
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();

  function populateVoiceSelect(){
    const sel = $('voiceSelect2');
    if(!sel) return;
    const deVoices = voices.filter(v => v.lang.toLowerCase().startsWith('de'));
    sel.innerHTML = '<option value="">Automatisch (männlich bevorzugt)</option>' +
      deVoices.map(v => `<option value="${v.name}">${v.name}</option>`).join('');
    sel.value = localStorage.getItem('Shadow_voice_name') || '';
  }

  function pickBestVoice(){
    const chosenName = localStorage.getItem('Shadow_voice_name');
    if(chosenName){
      const found = voices.find(v => v.name === chosenName);
      if(found) return found;
    }
    const deVoices = voices.filter(v => v.lang.toLowerCase().startsWith('de'));
    const maleHints = ['male','mann','markus','stefan','yannick','conrad','klaus','daniel'];
    const maleMatch = deVoices.find(v => maleHints.some(h => v.name.toLowerCase().includes(h)));
    if(maleMatch) return maleMatch;
    return deVoices[0] || voices[0] || null;
  }

  function speak(text){
    isSpeaking = true;
    setStatus('spreche', 'speaking');
    $('stopSpeakBtn').classList.add('show');
    const u = new SpeechSynthesisUtterance(text);
    const chosen = pickBestVoice();
    if(chosen) u.voice = chosen;
    u.lang = 'de-DE';
    const pitch = parseFloat(localStorage.getItem('Shadow_voice_pitch'));
    const rate = parseFloat(localStorage.getItem('Shadow_voice_rate'));
    u.pitch = !isNaN(pitch) ? pitch : 0.82;   // etwas tiefer -> männlicher
    u.rate = !isNaN(rate) ? rate : 1.04;      // minimal schneller -> flüssiger, weniger roboterhaft
    u.onend = () => {
      isSpeaking = false;
      isBusy = false;
      $('stopSpeakBtn').classList.remove('show');
      // Gesprächsfenster: nach einer Antwort kurz aktiv zuhören, ohne erneutes Wakeword
      awaitingCommand = true;
      setStatus('höre zu (gespräch)', 'listening');
      clearTimeout(convoTimeout);
      convoTimeout = setTimeout(() => {
        awaitingCommand = false;
        if(wakeModeOn) setStatus('lausche', 'listening');
      }, 9000);
      if(wakeModeOn){ try{ recognition.start(); }catch(e){} }
    };
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }

})();
</script>
